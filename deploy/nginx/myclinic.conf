# MyClinic — nginx virtual hosts (HTTP mode, SSL terminated upstream).
#
# Sits behind the NourNet edge (public IP / LB / WAF) which forwards TCP
# 80(/443) to this VM. nginx routes by hostname to the Docker containers:
#   myclinicsa.com.sa, www     -> web            127.0.0.1:3000
#   portal.myclinic.com.sa     -> portal         127.0.0.1:3001
#   staging.*                  -> staging web    127.0.0.1:3100
#   portalstaging.*            -> staging portal 127.0.0.1:3101
#
# Install (on the VM):
#   sudo apt-get install -y nginx
#   sudo cp /opt/myclinic/deploy/nginx/myclinic.conf /etc/nginx/sites-available/myclinic
#   sudo ln -sf /etc/nginx/sites-available/myclinic /etc/nginx/sites-enabled/myclinic
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# If NourNet passes 443 through instead of terminating SSL, run certbot and
# it rewrites these blocks itself:
#   sudo apt-get install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d myclinicsa.com.sa -d www.myclinicsa.com.sa \
#        -d portal.myclinic.com.sa

# Shared proxy settings
map $http_x_forwarded_proto $client_scheme {
    default $http_x_forwarded_proto;  # trust the edge's header when present
    ""      $scheme;
}

server {
    listen 80 default_server;
    server_name myclinicsa.com.sa www.myclinicsa.com.sa;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $client_scheme;
        proxy_read_timeout 60s;
    }
}

server {
    listen 80;
    server_name portal.myclinic.com.sa;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $client_scheme;
        proxy_read_timeout 60s;
    }
}

# ── Staging (internal review only — keep OFF the public edge, or protect) ───
server {
    listen 80;
    server_name staging.myclinicsa.com.sa;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $client_scheme;
    }
}

server {
    listen 80;
    server_name portalstaging.myclinic.com.sa;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3101;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $client_scheme;
    }
}

# MyClinic — full stack, self-hosted Postgres included.
#
# Configuration comes from a `.env` file next to this compose file (see
# .env.example). Deploy = `docker compose up -d db && docker compose up -d
# --build`; the GitHub Actions workflow runs exactly that on every push.
#
# NOTE on the web build: `next build` pre-renders the doctor pages from the
# database, so the db service must be RUNNING when the web image builds. The
# build runs with host networking and reaches Postgres through the
# loopback-only published port (127.0.0.1:5432) via DATABASE_URL_BUILD.

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Loopback only — never exposed to the internet. Needed for the web
      # image build and handy for admin/psql access from the server itself.
      # Override POSTGRES_PORT in .env if 5432 is already taken on the host.
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - uploads:/app/uploads
    expose:
      - "8020"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8020/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Public website — myclinicsa.com.sa. When PORTAL_URL is set in .env, its
  # /login and /dashboard paths redirect to the portal subdomain.
  web:
    build:
      context: .
      network: host
      args:
        # Build-time DB access (SSG of doctor pages) — see note above.
        DATABASE_URL: ${DATABASE_URL_BUILD}
        BACKEND_ORIGIN: http://backend:8020
    # WEB_IMAGE lets a second stack (staging) build its own tag instead of
    # overwriting production's image.
    image: ${WEB_IMAGE:-myclinic-web}
    restart: unless-stopped
    env_file: .env
    environment:
      BACKEND_ORIGIN: http://backend:8020
    ports:
      # Staging overrides WEB_BIND (e.g. 0.0.0.0:3100) to be reachable on the
      # private network; production keeps the loopback default.
      - "${WEB_BIND:-127.0.0.1:3000}:3000"
    depends_on:
      backend:
        condition: service_healthy

  # Dashboard portal — portal.myclinic.com.sa. Same image as web, switched
  # into portal mode: / redirects to /dashboard, responses are noindexed.
  portal:
    image: ${WEB_IMAGE:-myclinic-web}
    restart: unless-stopped
    env_file: .env
    environment:
      BACKEND_ORIGIN: http://backend:8020
      APP_MODE: portal
    ports:
      - "${PORTAL_BIND:-127.0.0.1:3001}:3000"
    depends_on:
      web:
        condition: service_started
      backend:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
